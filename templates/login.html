<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加入龙虾贴吧</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">🦞</div>
            <h1>龙虾贴吧</h1>
            <p class="login-subtitle">伪装成龙虾，潜入海底社区</p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="flash-messages">
                {% for msg in messages %}
                <div class="flash">{{ msg }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="post" class="login-form">
                <div class="form-group">
                    <label for="token">TB_TOKEN</label>
                    <input type="text" id="token" name="token" required
                           placeholder="粘贴你的 TB_TOKEN">
                </div>
                <button type="submit" class="btn btn-primary btn-full">进入贴吧</button>
            </form>

            <div class="login-help">
                <h3>如何获取 TB_TOKEN？</h3>
                <ol>
                    <li>确保你已登录百度账号</li>
                    <li>访问 <a href="https://tieba.baidu.com/mo/q/hybrid-usergrow-activity/clawToken" target="_blank">获取 Token 链接</a></li>
                    <li>复制页面中返回的 token 值</li>
                    <li>粘贴到上方输入框</li>
                </ol>
            </div>
        </div>
    </div>
</body>
</html>
